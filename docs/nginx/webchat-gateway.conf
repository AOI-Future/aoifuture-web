limit_req_zone $binary_remote_addr zone=webchat_ip_per_minute:10m rate=10r/m;
limit_req_zone $arg_to zone=webchat_to_per_minute:10m rate=10r/m;

map $http_origin $webchat_origin_allowed {
    default 0;
    "https://aoifuture.com" 1;
    "https://www.aoifuture.com" 1;
    "https://nozaki.com" 1;
    "https://www.nozaki.com" 1;
}

server {
    listen 443 ssl http2;
    server_name aoifuture.com www.aoifuture.com nozaki.com www.nozaki.com;

    location = /api/webchat-intake {
        if ($webchat_origin_allowed = 0) {
            return 403;
        }

        client_max_body_size 2k;

        limit_req zone=webchat_ip_per_minute burst=3 nodelay;
        limit_req zone=webchat_to_per_minute burst=3 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:4321;

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-Requested-With" always;
        add_header Vary "Origin" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
